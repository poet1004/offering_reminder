name: daily-shorts-assets

on:
  workflow_dispatch:
  schedule:
    - cron: '5 21 * * *'

jobs:
  build-shorts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate daily shorts assets
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ENV: ${{ secrets.KIS_ENV }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python scripts/generate_daily_shorts.py \
            --source-mode "캐시 우선" \
            --allow-packaged-sample \
            --out-dir data/exports/daily_shorts_ci
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-assets
          path: data/exports/daily_shorts_ci
