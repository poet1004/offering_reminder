name: mobile-feed-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '15 21 * * *'
  push:
    paths:
      - 'scripts/export_mobile_feed.py'
      - 'scripts/refresh_and_export_mobile_feed.py'
      - 'scripts/verify_mobile_feed.py'
      - 'scripts/refresh_live_cache.py'
      - 'src/**'
      - 'data/sample_ipo_events.csv'
      - 'data/sample_market_snapshot.csv'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  build-mobile-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh caches and export mobile feed
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ENV: ${{ secrets.KIS_ENV }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python scripts/refresh_and_export_mobile_feed.py

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-feed-artifacts
          path: |
            data/mobile/mobile-feed.json
            mobile-feed/
            data/runtime/mobile_feed_verify.json
            data/runtime/mobile_feed_pipeline_report.json

      - name: Commit updated mobile feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mobile/mobile-feed.json mobile-feed data/runtime/mobile_feed_verify.json data/runtime/mobile_feed_pipeline_report.json data/cache/*.csv data/cache/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh mobile feed"
          git push
