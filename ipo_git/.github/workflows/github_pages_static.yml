name: github-pages-static

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['mobile-feed-sync']
    types: [completed]
  push:
    branches:
      - main
    paths:
      - 'static_pages/**'
      - 'scripts/build_pages_site.py'
      - 'scripts/refresh_export_and_build_pages.py'
      - 'run_build_pages_site.bat'
      - 'run_build_pages_site.sh'
      - 'run_refresh_export_and_build_pages.bat'
      - 'run_refresh_export_and_build_pages.sh'
      - 'docs/DEPLOY.md'
      - 'docs/GITHUB_PAGES_KR.md'
      - 'mobile-feed/mobile-feed.json'
      - 'data/runtime/mobile_feed_verify.json'
      - 'data/backtest/versions_summary_pretty.csv'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          python scripts/build_pages_site.py --repo . --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
