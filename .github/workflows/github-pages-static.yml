name: github-pages-static

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['mobile-feed-pages']
    types: [completed]
  push:
    branches:
      - main
    paths:
      - '.github/workflows/github-pages-static.yml'
      - 'ipo_git/static_pages/**'
      - 'ipo_git/scripts/build_pages_site.py'
      - 'ipo_git/scripts/verify_mobile_feed.py'
      - 'ipo_git/scripts/write_official_api_status.py'
      - 'ipo_git/scripts/probe_public_data_api.py'
      - 'ipo_git/scripts/refresh_export_and_build_pages.py'
      - 'mobile-feed/mobile-feed.json'
      - 'ipo_git/data/runtime/mobile_feed_verify.json'
      - 'ipo_git/data/runtime/official_api_status.json'
      - 'ipo_git/data/runtime/live_cache_status.json'
      - 'ipo_git/data/runtime/official_api_probe.json'
      - 'ipo_git/data/backtest/versions_summary_pretty.csv'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          python ipo_git/scripts/build_pages_site.py \
            --repo ipo_git \
            --feed mobile-feed/mobile-feed.json \
            --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
