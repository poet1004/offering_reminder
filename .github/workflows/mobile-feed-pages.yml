name: mobile-feed-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mobile-feed-pages.yml'
      - 'ipo_git/data/cache/**'
      - 'ipo_git/data/bootstrap_cache/**'
      - 'ipo_git/data/sample_ipo_events.csv'
      - 'ipo_git/data/sample_market_snapshot.csv'
      - 'ipo_git/scripts/export_mobile_feed.py'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Resolve site base URL
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            SITE_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io"
          else
            SITE_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          fi
          echo "SITE_BASE_URL=${SITE_BASE_URL}" >> "$GITHUB_ENV"

      - name: Build mobile feed site
        run: |
          python ipo_git/scripts/export_mobile_feed.py \
            --repo ipo_git \
            --site-dir mobile-pages \
            --site-base-url "$SITE_BASE_URL"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
