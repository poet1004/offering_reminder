name: mobile-feed-pages

on:
  workflow_dispatch:
  schedule:
    - cron: '15 22 * * 1-5'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mobile-feed-pages.yml'
      - '.github/workflows/github-pages-static.yml'
      - 'ipo_git/data/cache/**'
      - 'ipo_git/data/bootstrap_cache/**'
      - 'ipo_git/data/sample_ipo_events.csv'
      - 'ipo_git/data/sample_market_snapshot.csv'
      - 'ipo_git/scripts/export_mobile_feed.py'
      - 'ipo_git/scripts/verify_mobile_feed.py'
      - 'ipo_git/scripts/refresh_live_cache.py'
      - 'ipo_git/scripts/refresh_market_snapshot.py'
      - 'ipo_git/scripts/refresh_official_api_cache.py'
      - 'ipo_git/scripts/write_official_api_status.py'
      - 'ipo_git/scripts/probe_public_data_api.py'
      - 'ipo_git/src/services/public_data_client.py'
      - 'ipo_git/scripts/build_pages_site.py'
      - 'ipo_git/static_pages/**'
      - 'ipo_git/src/services/market_service.py'

permissions:
  contents: write

concurrency:
  group: mobile-feed-pages
  cancel-in-progress: true

jobs:
  build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests pykrx lxml beautifulsoup4 openpyxl

      - name: Prepare runtime directory
        run: |
          mkdir -p ipo_git/data/runtime

      - name: Refresh public market snapshot cache
        continue-on-error: true
        run: |
          python ipo_git/scripts/refresh_market_snapshot.py --data-dir ipo_git/data

      - name: Refresh live issue caches
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        shell: bash
        run: |
          set +e
          python ipo_git/scripts/refresh_live_cache.py --data-dir ipo_git/data --skip-market --skip-official \
            > ipo_git/data/runtime/live_cache_status.json \
            2> ipo_git/data/runtime/live_cache_status.stderr.txt
          RC=$?
          set -e
          if [ ! -s ipo_git/data/runtime/live_cache_status.json ]; then
            printf '{"ok": false, "reason": "refresh_live_cache.py failed", "returnCode": %s}\n' "$RC" > ipo_git/data/runtime/live_cache_status.json
          fi

      - name: Refresh official public-data caches
        continue-on-error: true
        env:
          PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          KSD_PUBLIC_DATA_SERVICE_KEY: ${{ secrets.KSD_PUBLIC_DATA_SERVICE_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        shell: bash
        run: |
          export PUBLIC_DATA_SERVICE_KEY="${PUBLIC_DATA_SERVICE_KEY:-$KSD_PUBLIC_DATA_SERVICE_KEY}"
          export KSD_PUBLIC_DATA_SERVICE_KEY="${KSD_PUBLIC_DATA_SERVICE_KEY:-$PUBLIC_DATA_SERVICE_KEY}"
          RAW_OUT="ipo_git/data/runtime/official_api_status.raw.json"
          RAW_ERR="ipo_git/data/runtime/official_api_status.stderr.txt"
          if [ -z "${PUBLIC_DATA_SERVICE_KEY}${KSD_PUBLIC_DATA_SERVICE_KEY}" ]; then
            printf '{"ok": false, "reason": "PUBLIC_DATA_SERVICE_KEY missing", "serviceKeyConfigured": false}\n' > ipo_git/data/runtime/official_api_status.json
            exit 0
          fi
          set +e
          python ipo_git/scripts/refresh_official_api_cache.py --data-dir ipo_git/data > "$RAW_OUT" 2> "$RAW_ERR"
          RC=$?
          set -e
          python ipo_git/scripts/write_official_api_status.py \
            --data-dir ipo_git/data \
            --raw "$RAW_OUT" \
            --stderr "$RAW_ERR" \
            --output ipo_git/data/runtime/official_api_status.json \
            --exit-code "$RC" \
            --key-configured

      - name: Probe official public-data endpoints
        continue-on-error: true
        env:
          PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          KSD_PUBLIC_DATA_SERVICE_KEY: ${{ secrets.KSD_PUBLIC_DATA_SERVICE_KEY }}
        shell: bash
        run: |
          export PUBLIC_DATA_SERVICE_KEY="${PUBLIC_DATA_SERVICE_KEY:-$KSD_PUBLIC_DATA_SERVICE_KEY}"
          export KSD_PUBLIC_DATA_SERVICE_KEY="${KSD_PUBLIC_DATA_SERVICE_KEY:-$PUBLIC_DATA_SERVICE_KEY}"
          set +e
          python ipo_git/scripts/probe_public_data_api.py \
            --output ipo_git/data/runtime/official_api_probe.json \
            > ipo_git/data/runtime/official_api_probe.stdout.json \
            2> ipo_git/data/runtime/official_api_probe.stderr.txt
          RC=$?
          set -e
          if [ ! -s ipo_git/data/runtime/official_api_probe.json ]; then
            printf '{"ok": false, "reason": "probe_public_data_api.py failed", "returnCode": %s}\n' "$RC" > ipo_git/data/runtime/official_api_probe.json
          fi

      - name: Resolve public URLs
        shell: bash
        run: |
          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          JSDELIVR_BASE="https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/mobile-feed"
          RAW_BASE="https://raw.githubusercontent.com/${REPO}/${BRANCH}/mobile-feed"
          echo "JSDELIVR_BASE=${JSDELIVR_BASE}" >> "$GITHUB_ENV"
          echo "RAW_BASE=${RAW_BASE}" >> "$GITHUB_ENV"

      - name: Build mobile feed bundle
        run: |
          python ipo_git/scripts/export_mobile_feed.py \
            --repo ipo_git \
            --output-dir mobile-feed \
            --public-base-url "$JSDELIVR_BASE" \
            --fallback-base-url "$RAW_BASE"

      - name: Verify mobile feed bundle
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python ipo_git/scripts/verify_mobile_feed.py \
            --repo ipo_git \
            --feed mobile-feed/mobile-feed.json \
            --output ipo_git/data/runtime/mobile_feed_verify.json \
            > ipo_git/data/runtime/mobile_feed_verify.stdout.json \
            2> ipo_git/data/runtime/mobile_feed_verify.stderr.txt
          RC=$?
          set -e
          if [ ! -s ipo_git/data/runtime/mobile_feed_verify.json ]; then
            printf '{"ok": false, "reason": "verify_mobile_feed.py failed", "returnCode": %s}\n' "$RC" > ipo_git/data/runtime/mobile_feed_verify.json
          fi

      - name: Inspect generated runtime files
        shell: bash
        run: |
          ls -la ipo_git/data/runtime || true
          echo '--- official_api_status.json ---'
          cat ipo_git/data/runtime/official_api_status.json || true
          echo '--- mobile_feed_verify.json ---'
          cat ipo_git/data/runtime/mobile_feed_verify.json || true
          echo '--- live_cache_status.json ---'
          cat ipo_git/data/runtime/live_cache_status.json || true
          echo '--- official_api_probe.json ---'
          cat ipo_git/data/runtime/official_api_probe.json || true

      - name: Publish runtime summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          summary_path = Path('ipo_git/data/runtime')
          def load(name):
              path = summary_path / name
              if not path.exists():
                  return {'ok': False, 'reason': f'{name} missing'}
              try:
                  return json.loads(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  return {'ok': False, 'reason': f'{name} invalid json: {exc}'}
          official = load('official_api_status.json')
          verify = load('mobile_feed_verify.json')
          live = load('live_cache_status.json')
          probe = load('official_api_probe.json')
          lines = [
              '## Runtime status',
              '',
              f"- official_api_status.ok: {official.get('ok')}",
              f"- official_api_status.refreshSucceeded: {official.get('refreshSucceeded')}",
              f"- official_api_status.cachePopulated: {official.get('cachePopulated')}",
              f"- official_api_status.cacheRows: {official.get('cacheRows')}",
              f"- mobile_feed_verify.ok: {verify.get('ok')}",
              f"- mobile_feed_verify.warnings: {verify.get('warnings')}",
              f"- live_cache_status.ok: {live.get('ok')}",
              f"- official_api_probe.ok: {probe.get('ok')}",
              f"- official_api_probe.probes: {probe.get('probes')}",
          ]
          Path(str(Path.home())).mkdir(exist_ok=True)
          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as fp:
              fp.write('\n'.join(lines) + '\n')
          PY

      - name: Upload runtime diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-status
          path: |
            ipo_git/data/runtime/*.json
            ipo_git/data/runtime/*.txt
          if-no-files-found: warn

      - name: Commit generated mobile feed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-feed ipo_git/data/cache || true
          git add -f ipo_git/data/runtime/*.json || true
          git status --short || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh mobile feed"
          git push
